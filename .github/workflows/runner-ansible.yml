name: Run Ansible Playbook

# Скрипт запустится при любом push в ветку main (или master)
# А также его можно запустить вручную через кнопку в интерфейсе GitHub
on:
  workflow_dispatch:

jobs:
  ansible-execution:
    # КРИТИЧЕСКИ ВАЖНО: теги должны соответствовать вашему self-hosted раннеру
    runs-on: [self-hosted, Linux, ARM64]

    steps:
      # 1. Скачиваем файлы репозитория внутрь виртуалки Multipass
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Запускаем Ansible
      - name: Run Ansible Playbook
        run: |
          echo "Запуск Ansible плейбука..."
          ansible-playbook -i nodes.ini infra-cluster-setup.yml   
